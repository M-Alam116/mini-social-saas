version: '3.8'

services:
  # 1. NestJS App Clusters
  api:
    build: .
    restart: unless-stopped
    # Use Docker Compose's built-in scaling
    # This automatically starts 3 separate containers running our PM2 image
    deploy:
      replicas: 3
    environment:
      # These will be pulled from your local .env file during deployment
      - DATABASE_URL=${DOCKER_DATABASE_URL:-postgresql://postgres:alam@host.docker.internal:5432/social?schema=public}
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-1d}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - DB_POOL_MAX=${DB_POOL_MAX:-30}
      - DB_POOL_MIN=${DB_POOL_MIN:-10}
    depends_on:
      - redis
    # Allow container to reach your Windows Host (for PostgreSQL)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 2. Redis Cache
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6380:6379" # Map to 6380 so it doesn't conflict with your desktop Redis

  # 3. Nginx Load Balancer
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80" # Maps localhost:8080 to Nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
